<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cryptic Flappy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: monospace;
  color: #00ff00;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#score {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 20px;
  z-index: 2;
}

#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  text-align: center;
  z-index: 3;
}

button {
  padding: 10px 20px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="gameOver">
  <h1>⚠ SYSTEM FAILURE</h1>
  <button onclick="restart()">RETRY</button>
</div>

<canvas id="matrix"></canvas>
<canvas id="game"></canvas>

<script>
// MATRIX BACKGROUND
const matrixCanvas = document.getElementById("matrix");
const mtx = matrixCanvas.getContext("2d");

matrixCanvas.width = window.innerWidth;
matrixCanvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = matrixCanvas.width / fontSize;
const drops = [];

for (let i = 0; i < columns; i++) drops[i] = 1;

function drawMatrix() {
  mtx.fillStyle = "rgba(0,0,0,0.05)";
  mtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

  mtx.fillStyle = "#00ff00";
  mtx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    mtx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix, 33);

// GAME
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird = { x: 80, y: 200, velocity: 0 };
let gravity = 0.5;
let lift = -10;

let pipes = [];
let frame = 0;
let score = 0;
let gameRunning = true;

// TAP SOUND
function tapSound() {
  const audio = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.frequency.value = 700;
  osc.type = "square";

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.1);
}

// GLITCH SOUND
function glitchSound() {
  const audio = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.frequency.setValueAtTime(100, audio.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20, audio.currentTime + 0.5);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.5);
}

// CONTROLS
document.addEventListener("click", () => {
  if (!gameRunning) return;
  bird.velocity = lift;
  tapSound();
});

// GAME LOOP
function loop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  bird.velocity += gravity;
  bird.y += bird.velocity;

  ctx.fillStyle = "#00ff00";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 10, 0, Math.PI * 2);
  ctx.fill();

  if (frame % 90 === 0) {
    let top = Math.random() * (canvas.height / 2);
    let gap = 150;
    pipes.push({
      x: canvas.width,
      top: top,
      bottom: canvas.height - top - gap
    });
  }

  pipes.forEach((p) => {
    p.x -= 3;

    ctx.fillStyle = "#00ff00";
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom);

    if (
      bird.x < p.x + 50 &&
      bird.x + 10 > p.x &&
      (bird.y < p.top || bird.y > canvas.height - p.bottom)
    ) {
      endGame();
    }

    if (p.x === bird.x) {
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  });

  if (bird.y > canvas.height || bird.y < 0) {
    endGame();
  }

  frame++;
  requestAnimationFrame(loop);
}

// GLITCH EFFECT
function glitchEffect() {
  let i = 0;
  const glitch = setInterval(() => {
    canvas.style.transform =
      `translate(${Math.random()*10}px, ${Math.random()*10}px) skew(${Math.random()*5}deg)`;
    i++;
    if (i > 10) {
      clearInterval(glitch);
      canvas.style.transform = "none";
    }
  }, 50);
}

function endGame() {
  gameRunning = false;
  glitchSound();
  glitchEffect();
  document.getElementById("gameOver").style.display = "block";
}

function restart() {
  bird.y = 200;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  frame = 0;
  gameRunning = true;
  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("gameOver").style.display = "none";
  loop();
}

loop();
</script>

</body>
</html>
